name: TrinityCore Complete Build (All Platforms)

on:
  push:
    branches: [ "master", "3.3.5", "wotlk_classic", "cata_classic" ]
  pull_request:
    branches: [ "master", "3.3.5", "wotlk_classic", "cata_classic" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build on Ubuntu (GCC 13)
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        cc: [gcc-13]
        cxx: [g++-13]
        pch: [1]
        launcher: [ccache]
    env:
      CC: /usr/bin/${{ matrix.cc }}
      CXX: /usr/bin/${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -yq ccache libboost-dev \
          libboost-filesystem-dev libboost-locale-dev libboost-program-options-dev \
          libboost-regex-dev libboost-thread-dev libssl-dev libreadline-dev \
          zlib1g-dev libbz2-dev
      - name: Configure CMake
        run: |
          cmake -GNinja -B build -DWITH_WARNINGS=1 \
            -DWITH_COREDEBUG=0 -DUSE_COREPCH=${{ matrix.pch }} \
            -DUSE_SCRIPTPCH=${{ matrix.pch }} -DTOOLS=1 -DSCRIPTS=dynamic \
            -DSERVERS=1 -DCMAKE_C_FLAGS_DEBUG="-DNDEBUG -g0" \
            -DCMAKE_CXX_FLAGS_DEBUG="-DNDEBUG -g0" -DBUILD_TESTING=1
      - name: Build
        run: cmake --build build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trinitycore-linux
          path: build/bin/

  build-macos:
    name: Build on macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        env:
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: 1
        run: |
          brew update
          for pkg in mysql openssl readline cmake boost coreutils ninja; do
            brew ls --versions $pkg || brew install $pkg
          done
      - name: Configure CMake
        run: |
          cmake -GNinja -B build -DWITH_WARNINGS=1 -DWITH_COREDEBUG=0 \
            -DUSE_COREPCH=1 -DUSE_SCRIPTPCH=1 -DTOOLS=1 -DSCRIPTS=static \
            -DSERVERS=1 -DBUILD_TESTING=1 -DCMAKE_C_FLAGS_DEBUG="-DNDEBUG" \
            -DCMAKE_CXX_FLAGS_DEBUG="-DNDEBUG"
      - name: Build
        run: cmake --build build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trinitycore-macos
          path: build/bin/

  build-windows:
    name: Build on Windows (MSVC 2022)
    runs-on: windows-latest
    env:
      MYSQL_ROOT_DIR: C:/Program Files/MySQL/MySQL Server 8.0
    steps:
      - uses: actions/checkout@v5
      - name: Setup OpenSSL cache
        id: openssl-cache
        uses: actions/cache@v4
        with:
          path: C:/libs/openssl
          key: openssl-3.0-windows
      - name: Download OpenSSL (if cache miss)
        if: steps.openssl-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o openssl.exe "https://slproweb.com/download/Win64OpenSSL-3_4_1.exe"
          Start-Process -Wait -FilePath openssl.exe "/SILENT","/SP-","/SUPPRESSMSGBOXES",/DIR="C:/libs/openssl"
      - name: Install Boost
        uses: MarkusJx/install-boost@v2
        with:
          boost_version: 1.84.0
          link: static
          platform_version: 2022
          toolset: msvc
      - name: Setup VS Environment
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64
      - name: Configure CMake
        env:
          BOOST_ROOT: ${{ steps.install-boost.outputs.BOOST_ROOT }}
          OPENSSL_ROOT_DIR: C:/libs/openssl
        run: cmake -GNinja -B build -DWITH_WARNINGS_AS_ERRORS=OFF -DTOOLS=ON
      - name: Build
        run: cmake --build build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trinitycore-windows
          path: build/bin/RelWithDebInfo/
